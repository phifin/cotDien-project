name: Deploy Form App to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/form-app/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/deploy-form-app.yml"

env:
  APP_NAME: form-app

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    concurrency:
      group: pages-form-app
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build form app
        run: pnpm --filter @repo/form-app build
        env:
          VITE_APP_BASE_PATH: /${{ github.event.repository.name }}/form-app/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy form app to gh-pages/form-app
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: apps/form-app/dist
          destination_dir: form-app
          keep_files: true
          enable_jekyll: false
